; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
; Dual OTA slots required for HTTPUpdate / esp_ota
board_build.partitions = min_spiffs.csv

; After each build: scripts/post_version_txt.py writes .pio/build/<env>/version.txt (OTA check file)
extra_scripts = post:scripts/post_version_txt.py

; Serial: if upload says "Please specify upload_port", set an explicit port, e.g. upload_port = COM5
; (Device Manager -> Ports). Pattern below picks any COMx — narrow (e.g. COM[345]) if you have several.
upload_port = COM6
monitor_port = COM6

lib_deps =
  adafruit/Adafruit SSD1306
  adafruit/Adafruit GFX Library
  knolleary/PubSubClient